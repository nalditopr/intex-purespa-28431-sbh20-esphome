substitutions:
  name: intex-spa-atom
  friendly_name: "Intex PureSpa (Atom)"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: m5stack-atom
  framework:
    type: arduino       # required: the component uses the Arduino HAL + attachInterruptArg

# Local component (this folder). To consume from GitHub instead, use:
#   source: github://nalditopr/intex-purespa-28431-sbh20-esphome
#   (and point it at esp32-atom/components)
external_components:
  - source:
      type: local
      path: components
    components: [intexsbh20]

logger:
api:
  encryption:
    key: !secret api_key
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # ESP32 draws ~2x the ESP8266 and spikes harder on WiFi TX. Lowering TX power
  # and enabling light power-save keeps current spikes within what the spa 5V
  # tap + a small (10 uF) bulk cap can handle. Raise output_power if range suffers.
  output_power: 12dB
  power_save_mode: light
  ap:
    ssid: "${name} setup"

captive_portal:

# Core entity domains
climate:
sensor:
switch:
text_sensor:

# Atom Lite pins (all GPIO < 32, required by the fast ISR path). Verified against
# the live spa bus with a pin-role scan: G19 = clock, G22 = data, G23 = latch.
intexsbh20:
  clock_pin: 19
  data_pin: 22
  latch_pin: 23
  climate:
    name: Thermostat
    icon: mdi:hot-tub
  power:
    name: Power
    icon: mdi:power
  filter:
    name: Filter
    icon: mdi:air-filter
  bubble:
    name: Bubble
    icon: mdi:chart-bubble
  water_temperature:
    name: Water temperature
    icon: mdi:water-thermometer
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    unit_of_measurement: "°C"
  error_text:
    name: Error
    icon: mdi:alert-circle
    entity_category: diagnostic
