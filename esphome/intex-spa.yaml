substitutions:
  name: intex-spa
  friendly_name: "Intex PureSpa"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.f_cpu: 160000000L      # REQUIRED: 160 MHz for button timing
  on_boot:
    priority: -100
    then:
      - lambda: |-
          ESP_LOGW("cpu_check", "==== Runtime CPU frequency: %u MHz ====", ESP.getCpuFreqMHz());

esp8266:
  board: d1_mini

external_components:
  - source: github://piitaya/esphome-intexsbh20
    components: [intexsbh20]

logger:
api:
  encryption:
    key: !secret api_key
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${name} setup"

captive_portal:

# Core entity domains must be declared so the component can register into them
climate:
sensor:
switch:
text_sensor:

# Pins (piitaya defaults): CLK=GPIO14/D5, DATA=GPIO12/D6, LATCH=GPIO13/D7
# As-built wire colors: white=CLK, yellow=DATA, black=LATCH, red=5V, green=GND
# 470 ohm series resistor on each of CLK/DATA/LATCH between BSS138 LV and the GPIO.
intexsbh20:
  climate:
    name: Thermostat
    icon: mdi:hot-tub
  power:
    name: Power
    icon: mdi:power
  filter:
    name: Filter
    icon: mdi:air-filter
  bubble:
    name: Bubble
    icon: mdi:chart-bubble
  water_temperature:
    name: Water temperature
    icon: mdi:water-thermometer
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    unit_of_measurement: "°C"
  error_text:
    name: Error
    icon: mdi:alert-circle
    entity_category: diagnostic
